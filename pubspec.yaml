name: lerno
description: "A cross-platform kids learning application with gamified UI, 1v1 battles, and a Flame mini-game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.1
  
  # UI & Styling
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.3.0
  
  # Game Engine
  flame: ^1.14.0
  
  # Backend & Auth (Firebase)
  # REMOVED: Legacy packages purged for FastAPI transition.
  
  # Network & Security
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  
  # Utils & UI Polish
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.2
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  audioplayers: ^5.2.1
  lottie: ^3.1.2
  rive: ^0.13.1
  
  # Social Auth
  # REMOVED: Legacy packages purged for FastAPI transition.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_chess_board: ^1.0.1
  chess: ^0.7.0
  lucide_icons_flutter: ^3.1.14+2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/svg/avatars/
    - assets/svg/badges/
    - assets/svg/leagues/
    - assets/svg/rewards/
    - assets/svg/banners/
    - assets/svg/courses/
    - assets/svg/games/
    - assets/svg/icons/
    - assets/svg/empty_states/
    - assets/svg/onboarding/
    - assets/audio/ui/
    - assets/audio/games/
    - assets/audio/battle/
    - assets/audio/profile/
    - assets/audio/rewards/
    - assets/audio/music/
    - assets/animations/lottie/
    - assets/animations/rive/
    - assets/images/backgrounds/
    - assets/images/thumbnails/
